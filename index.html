<!DOCTYPE html>
<html>
<head>
  <script>
    const routes = {
      "audio_1": "https://de.wikipedia.org/wiki/Datei:Eo_circle_blue_number-1.svg",
      "audio_2": "https://de.wikipedia.org/wiki/Datei:Eo_circle_blue_number-2.svg",
      "audio_3": "https://de.wikipedia.org/wiki/Datei:Eo_circle_blue_number-3.svg"
    };

    const path = window.location.pathname.split("/")[2];

    if (routes[path]) {
      window.location.replace(routes[path]);
    } else {
      document.body.innerHTML = "Link nicht gefunden";
    }
  </script>
</head>
<body></body>
</html>
